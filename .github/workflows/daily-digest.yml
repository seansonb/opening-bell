name: Daily Stock Digest

on:
  schedule:
    # Run at 8:30 AM ET (1 hour before market opens at 9:30 AM ET)
    # Cron is in UTC; during EDT (UTC-4): 8:30 AM ET = 12:30 PM UTC
    # Note: During EST (UTC-5, ~Nov-Mar) this runs at 7:30 AM ET
    - cron: '30 12 * * 1-5'  # Monday-Friday at 12:30 PM UTC (8:30 AM EDT)
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download DB artifact
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: daily-digest.yml
        name: opening-bell-db
        path: data/
      continue-on-error: true

    - name: Run daily digest
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: |
        python src/main.py

    - name: Upload DB artifact
      uses: actions/upload-artifact@v4
      with:
        name: opening-bell-db
        path: data/opening_bell.db
        retention-days: 7

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs
        path: |
          *.log
          src/*.log
